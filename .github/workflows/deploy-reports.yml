name: Deploy Reports to GitHub Pages

on:
  push:
    branches: [ main, master ]
  workflow_run:
    workflows: ["MediFind Docker Container Build & Quality Check", "Android Appium E2E Automation Pipeline"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

concurrency:
  group: "pages-official"
  cancel-in-progress: false

jobs:
  deploy-reports:
    name: Publish Full Test Cases & Reports to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 📥 Stage 1: Checkout Repository
        uses: actions/checkout@v4

      - name: 🔍 Stage 2: Environment & Workspace Debugging
        run: |
          echo "=========================================="
          echo "📍 PWD: $(pwd)"
          echo "🐍 Python Version: $(python3 --version)"
          echo "🟢 Node Version: $(node --version)"
          echo "=========================================="
          ls -la

      - name: 🟢 Stage 3: Setup Node.js & Dependencies
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📊 Stage 4: Generate All Test Suite Artifacts (470+ Test Cases)
        run: |
          python3 -m pip install openpyxl --break-system-packages || pip install openpyxl || true
          python3 scripts/generate_live_reports.py
          python3 scripts/generate_android_reports.py

      - name: 📁 Stage 5: Prepare Public Pages Assets
        run: |
          mkdir -p public/reports/latest
          mkdir -p public/reports/history/build-${{ github.run_number }}
          mkdir -p public/Test\ Results/Excel
          mkdir -p public/Test\ Results/HTML
          mkdir -p public/Test\ Results/JSON

          # Copy main app files
          cp -r index.html js styles.css sw.js manifest.json assets public/ 2>/dev/null || cp -r index.html js styles.css sw.js public/

          # Copy HTML reports to root and reports folder
          cp -r "Test Results/HTML/"* public/ 2>/dev/null || true
          cp -r "Test Results/HTML/"* public/reports/latest/ 2>/dev/null || true
          cp -r "Test Results/Summary/summary.md" public/reports/latest/ 2>/dev/null || true
          cp -r "Test Results/Screenshots" public/reports/latest/ 2>/dev/null || true
          cp -r "Test Results/Logs" public/reports/latest/ 2>/dev/null || true

          # Copy Excel and JSON files
          cp -r "Test Results/Excel/"* "public/Test Results/Excel/" 2>/dev/null || true
          cp -r "Test Results/JSON/"* "public/Test Results/JSON/" 2>/dev/null || true

          # Copy to history
          cp -r public/reports/latest/* public/reports/history/build-${{ github.run_number }}/ 2>/dev/null || true

      - name: 📦 Stage 6: Upload GitHub Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: 🚀 Stage 7: Deploy to Official GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
