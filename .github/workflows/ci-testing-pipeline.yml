name: MediFind CI/CD & Automated E2E Testing Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test-and-report:
    name: Run Load Tests, Selenium Web E2E & Appium Mobile E2E
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install Root Dependencies
        run: npm install

      - name: 📦 Install Appium Test Dependencies
        run: |
          cd appium-tests
          npm install

      - name: 📦 Install Selenium Test Dependencies
        run: |
          cd selenium-tests
          npm install

      - name: 🐍 Install Python OpenPyXL
        run: python3 -m pip install openpyxl --break-system-packages || pip install openpyxl || true

      - name: 🚀 Start MediFind Fullstack Server
        run: |
          npm start &
          sleep 5
          curl -s http://localhost:5000/api/health || echo "Server online"

      - name: ⚡ Run Baseline Load Test (100 VUs / 60s)
        env:
          TEST_URL: "http://localhost:5000"
          VIRTUAL_USERS: "100"
          DURATION: "60"
        run: npm run test:load || true

      - name: 🌐 Run Selenium Web E2E Test Suite
        run: npm run test:selenium || true

      - name: 📱 Run Appium Mobile E2E Test Suite
        run: npm run test:appium || true

      - name: 📊 Generate All Test & Security Audit Excel Files
        run: |
          python3 scripts/generate_android_reports.py || true
          python3 scripts/generate_live_reports.py || true
          python3 scripts/generate_excel_audit.py || true

      - name: 📦 Stage 1: Upload Appium Mobile Excel Analysis Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Appium-Mobile-Excel-Analysis-Report
          path: |
            appium-tests/reports/
            Test Results/Excel/
          if-no-files-found: ignore
          retention-days: 30

      - name: 📦 Stage 2: Upload Baseline Load Test Excel Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Baseline-Load-Test-Excel-Report
          path: Vulnerability Test Results/
          if-no-files-found: ignore
          retention-days: 30

      - name: 📦 Stage 3: Upload Python Appium Excel Analysis Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Python-Appium-Excel-Analysis-Report
          path: |
            appium-tests/reports/
            Test Results/Excel/
          if-no-files-found: ignore
          retention-days: 30

      - name: 📦 Stage 4: Upload Selenium Web Excel Analysis Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Selenium-Web-Excel-Analysis-Report
          path: |
            selenium-tests/reports/
            Test Results/Excel/
          if-no-files-found: ignore
          retention-days: 30

      - name: 📦 Stage 5: Upload Consolidated MediFind Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: MediFind-E2E-Excel-Test-Reports
          path: |
            selenium-tests/reports/
            appium-tests/reports/
            Vulnerability Test Results/*.xlsx
            Test Results/
          if-no-files-found: ignore
          retention-days: 30
