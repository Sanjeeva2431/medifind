name: MediFind CI/CD & Automated E2E Testing Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test-and-report:
    name: Run Load Tests, Selenium Web E2E & Appium Mobile E2E
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Root Dependencies
        run: npm ci || npm install

      - name: 📦 Install Appium Test Dependencies
        run: |
          cd appium-tests
          npm install

      - name: 📦 Install Selenium Test Dependencies
        run: |
          cd selenium-tests
          npm install

      - name: 🚀 Start MediFind Fullstack Server
        run: |
          npm start &
          sleep 5
          curl -s http://localhost:5000/api/health || echo "Server starting..."

      - name: ⚡ Run Baseline Load Test (100 VUs / 60s)
        env:
          TEST_URL: "http://localhost:5000"
          VIRTUAL_USERS: "100"
          DURATION: "60"
        run: npm run test:load

      - name: 🌐 Run Selenium Web E2E Test Suite
        run: npm run test:selenium

      - name: 📱 Run Appium Mobile E2E Test Suite
        run: npm run test:appium

      - name: 📊 Upload Excel Analysis Reports as GitHub Actions Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: MediFind-E2E-Excel-Test-Reports
          path: |
            selenium-tests/reports/*.xlsx
            appium-tests/reports/*.xlsx
          retention-days: 30
