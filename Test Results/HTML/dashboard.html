<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Android E2E Analytics Dashboard - MediFind</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; padding: 20px; }
        .chart-card { background-color: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <h3 class="fw-bold mb-4">📱 Android Mobile E2E Test Suite Dashboard</h3>
        <div class="row g-4">
            <div class="col-md-6">
                <div class="chart-card text-center">
                    <h5>Test Status Distribution</h5>
                    <canvas id="pieChart"></canvas>
                </div>
            </div>
            <div class="col-md-6">
                <div class="chart-card text-center">
                    <h5>Execution Time Metrics</h5>
                    <div class="p-4">
                        <h4>Total Executed: 510</h4>
                        <h5 class="text-success">Passed: 498 (97.6%)</h5>
                        <h5 class="text-danger">Failed: 9</h5>
                        <h5 class="text-warning">Skipped: 3</h5>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        const ctxPie = document.getElementById('pieChart').getContext('2d');
        new Chart(ctxPie, {
            type: 'doughnut',
            data: {
                labels: ['Passed', 'Failed', 'Skipped'],
                datasets: [{
                    data: [498, 9, 3],
                    backgroundColor: ['#22c55e', '#ef4444', '#f59e0b']
                }]
            }
        });
    </script>
</body>
</html>
